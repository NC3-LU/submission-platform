# Production compose for applications.nc3.lu.
#
# This is a STANDALONE file, not an override. It is used as:
#   docker-compose -f docker-compose.prod.yml --env-file docker-compose.env ...
#
# It is deliberately separate from docker-compose.yml (which targets the
# Dokploy test server) because the two environments serve PHP differently:
#
#   here            php-fpm on 127.0.0.1:9000. The host Apache vhost proxies
#                   PHP via fastcgi and serves static assets itself from
#                   /var/www/applications.nc3.lu/public.
#   docker-compose  self-contained Apache on :80 behind Traefik, attached to
#     .yml          the external dokploy network.
#
# Using an override would not work: compose merges service network lists, so
# the external dokploy-network requirement would leak in and fail here, where
# that network does not exist.
#
# The volume names must stay dbdata / storage_data. Combined with the compose
# project name (derived from the directory, applicationsnc3lu) they resolve to
# the existing applicationsnc3lu_dbdata and applicationsnc3lu_storage_data.
# Renaming either would silently create empty volumes and present as data loss.

# Pinned explicitly rather than derived from the directory name. Compose
# normalises the directory to build the project name, and the project name
# prefixes the volume names. If it ever drifted (directory renamed, deployed
# from another path) compose would create EMPTY volumes and the app would come
# up looking wiped. Pinning guarantees applicationsnc3lu_dbdata and
# applicationsnc3lu_storage_data - the volumes production already uses.
name: applicationsnc3lu

services:
  db:
    image: mysql:8.0.36-debian
    container_name: nc3_db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - docker-compose.env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 15
      interval: 10s
      start_period: 60s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-fpm
      args:
        PROXY: ${PROXY}
    container_name: nc3_app
    ports:
      - "127.0.0.1:9000:9000"
    restart: unless-stopped
    env_file:
      - docker-compose.env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      PROXY: ${PROXY}
    volumes:
      - storage_data:/var/www/html/storage
      # The host Apache serves static assets from this directory and the
      # fastcgi handler resolves /var/www/html/public/index.php, so the
      # container must see the same public/ the host does.
      - ./public:/var/www/html/public
      # .env is deliberately excluded from the image by .dockerignore so
      # secrets never land in an image layer. Production still needs it at
      # runtime (APP_KEY, mail, session, Pandora), and docker-compose.env only
      # carries database credentials - so mount the file the deploy workflow
      # writes. Without this the app boots with no APP_KEY and every encrypted
      # operation fails.
      - ./.env:/var/www/html/.env:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-fpm
      args:
        PROXY: ${PROXY}
    container_name: nc3_queue
    restart: unless-stopped
    env_file:
      - docker-compose.env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      PROXY: ${PROXY}
      # The app container owns migrations; running them from both races on an
      # unlocked schema. See docker/entrypoint.sh.
      RUN_MIGRATIONS: "false"
    command: php artisan queue:work --tries=3 --sleep=3 --timeout=180 --max-time=3600
    volumes:
      - storage_data:/var/www/html/storage
      # Same reasoning as the app service.
      - ./.env:/var/www/html/.env:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  # --- Pandora file-scanning stack ---
  # Mirrors the pandora-profile services in docker-compose.yml, adapted for prod:
  # no compose profiles (deploy.sh brings them up by name) and attached to
  # app_network so the app resolves http://pandora:6100. Config lives in
  # docker/pandora/ (rsynced with the code).
  redis:
    image: redis:7.4.9
    working_dir: /cache
    command:
      - /bin/sh
      - -c
      - |
          cp /etc/redis/cache.conf /cache/cache.conf
          redis-server /cache/cache.conf --daemonize no
    volumes:
      - pandora_cache:/cache
      - ./docker/pandora/config/cache.conf:/etc/redis/cache.conf:ro
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "-s", "/cache/cache.sock", "ping"]
      interval: 10s
      timeout: 1s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  kvrocks:
    image: apache/kvrocks:2.15.0
    user: root
    volumes:
      - pandora_storage:/var/lib/kvrocks
    command: ["--log-dir", "stdout", "--port", "6101"]
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-p", "6101", "ping"]
      interval: 10s
      timeout: 1s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  kvrocks-indexing:
    image: apache/kvrocks:2.15.0
    user: root
    volumes:
      - pandora_indexing:/var/lib/kvrocks
      - pandora_indexing_sock:/pandora-sock
      - ./docker/pandora/config/kvrocks-indexing.conf:/etc/kvrocks/kvrocks.conf:ro
    command: ["-c", "/etc/kvrocks/kvrocks.conf"]
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "-s", "/pandora-sock/kvrocks_index.sock", "ping"]
      interval: 10s
      timeout: 1s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  clamav:
    image: clamav/clamav:1.5.2
    volumes:
      - clamav-socket:/var/run/clamav
      - ./docker/pandora/config/clamav/clamd.conf:/etc/clamav/clamd.conf:ro
      - ./docker/pandora/config/clamav/freshclam.conf:/etc/clamav/freshclam.conf:ro
    environment:
      - HTTP_PROXY=${PROXY}
      - HTTPS_PROXY=${PROXY}
      - http_proxy=${PROXY}
      - https_proxy=${PROXY}
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "1"]
      start_period: 180s
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  pandora:
    image: ghcr.io/pandora-analysis/pandora:v1.12.2
    depends_on:
      redis:
        condition: service_started
      kvrocks:
        condition: service_started
      kvrocks-indexing:
        condition: service_started
      clamav:
        condition: service_healthy
    expose: ["6100"]
    mem_limit: 2g
    environment:
      - HTTP_PROXY=${PROXY}
      - HTTPS_PROXY=${PROXY}
      - http_proxy=${PROXY}
      - https_proxy=${PROXY}
    working_dir: /pandora
    tty: true
    command:
      - /bin/sh
      - -c
      - |
          echo "[pandora] waiting for dependencies..."
          sleep 30
          echo "[pandora] reducing gunicorn workers to 2..."
          sed -i "s/'-w', '10'/'-w', '2'/" /pandora/bin/start_website.py
          echo "[pandora] starting workers..."
          poetry run workers_manager &
          echo "[pandora] starting website on port 6100..."
          poetry run start_website &
          echo "[pandora] all services started"
          wait
    env_file:
      - ./docker/pandora/pandora.env
    volumes:
      - pandora_cache:/pandora/cache
      - pandora_storage:/pandora/storage
      - pandora_indexing_sock:/pandora/indexing
      - clamav-socket:/var/run/clamav
      - ./docker/pandora/config/generic.json:/pandora/config/generic.json:ro
      - ./docker/pandora/workers/base.yml:/pandora/pandora/workers/base.yml:ro
      - ./docker/pandora/workers/clamav.yml:/pandora/pandora/workers/clamav.yml:ro
      - ./docker/pandora/yara_rules:/pandora/yara_rules:ro
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  dbdata:
  storage_data:
  pandora_cache:
  pandora_storage:
  pandora_indexing:
  pandora_indexing_sock:
  clamav-socket:
