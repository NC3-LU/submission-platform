; Upload limits must exceed what the application validates, otherwise PHP
; discards the file before Laravel ever sees it and the user gets a bare
; "failed to upload" with no useful cause.
;
;   submission attachments  10 MB  (App\Livewire\SubmissionForm)
;   form header images       4 MB  (Store/UpdateFormRequest)
;
; PHP defaults are 2M/8M, which silently truncated both.
upload_max_filesize = 12M
post_max_size = 24M

; A header image may be up to 6000x6000 (dimensions rule). Decoding one costs
; ~4 bytes/pixel in ImageColorExtractor, which overruns the 128M default.
memory_limit = 256M
