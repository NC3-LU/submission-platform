# Kvrocks indexing config for Pandora (Docker)
# This runs as a separate container, sharing the socket with Pandora
# via the pandora_indexing_sock volume.

unixsocket /pandora-sock/kvrocks_index.sock
unixsocketperm 777
socket-fd -1
timeout 0
workers 4
daemonize no
cluster-enabled no
maxclients 10000
db-name storage.db
dir /var/lib/kvrocks
log-dir stdout
log-level info
supervised no
