# Redis cache configuration for Pandora (Docker)
# This config is mounted into both the Redis container and shared with Pandora
# via a named volume so Pandora can access the Unix socket.

bind 0.0.0.0
protected-mode no
port 0

# Unix socket — shared with Pandora container via pandora_cache volume
unixsocket cache.sock
unixsocketperm 777

timeout 0
tcp-keepalive 300
daemonize no
loglevel notice
logfile ""
databases 16
always-show-logo no

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir ./

appendonly no
hz 10
dynamic-hz yes
