services:
  db:
    image: mysql:8.0.36-debian
    container_name: nc3_db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    networks:
      default:
        aliases:
          - nc3-mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 15
      interval: 10s
      start_period: 60s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROXY: ${PROXY}
    container_name: nc3_app
    expose:
      - "80"
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL}
      APP_TIMEZONE: ${APP_TIMEZONE:-UTC}
      APP_LOCALE: ${APP_LOCALE:-en}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_STACK: ${LOG_STACK:-single}
      LOG_LEVEL: ${LOG_LEVEL:-error}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: nc3-mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-}
      VITE_APP_NAME: ${VITE_APP_NAME:-}
      API_DOCS_ALLOWED_DOMAINS: ${API_DOCS_ALLOWED_DOMAINS:-}
      PANDORA_ENABLED: ${PANDORA_ENABLED:-false}
      PANDORA_URL: ${PANDORA_URL:-http://pandora:6100}
      PANDORA_TIMEOUT: ${PANDORA_TIMEOUT:-30}
      PANDORA_POLL_INTERVAL: ${PANDORA_POLL_INTERVAL:-2}
      PANDORA_BLOCK_MALICIOUS: ${PANDORA_BLOCK_MALICIOUS:-true}
      PROXY: ${PROXY}
    networks:
      - default
      - dokploy-network
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy

  # --- Pandora file scanning stack (optional) ---
  # Activate with: COMPOSE_PROFILES=pandora docker compose up -d
  # Or in Dokploy: add COMPOSE_PROFILES=pandora to environment variables

  redis:
    image: redis:7
    profiles: [pandora]
    working_dir: /cache
    command:
      - /bin/sh
      - -c
      - |
          cp /etc/redis/cache.conf /cache/cache.conf
          redis-server /cache/cache.conf --daemonize no
    volumes:
      - pandora_cache:/cache
      - ./docker/pandora/config/cache.conf:/etc/redis/cache.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-s", "/cache/cache.sock", "ping"]
      interval: 10s
      timeout: 1s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  kvrocks:
    image: apache/kvrocks:latest
    profiles: [pandora]
    user: root
    volumes:
      - pandora_storage:/var/lib/kvrocks
    command: ["--log-dir", "stdout", "--port", "6101"]
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-p", "6101", "ping"]
      interval: 10s
      timeout: 1s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  kvrocks-indexing:
    image: apache/kvrocks:latest
    profiles: [pandora]
    user: root
    volumes:
      - pandora_indexing:/var/lib/kvrocks
      - pandora_indexing_sock:/pandora-sock
      - ./docker/pandora/config/kvrocks-indexing.conf:/etc/kvrocks/kvrocks.conf:ro
    command: ["-c", "/etc/kvrocks/kvrocks.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "-s", "/pandora-sock/kvrocks_index.sock", "ping"]
      interval: 10s
      timeout: 1s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  clamav:
    image: clamav/clamav
    profiles: [pandora]
    volumes:
      - clamav-socket:/var/run/clamav
      - ./docker/pandora/config/clamav/clamd.conf:/etc/clamav/clamd.conf:ro
      - ./docker/pandora/config/clamav/freshclam.conf:/etc/clamav/freshclam.conf:ro
    environment:
      - HTTP_PROXY=${PROXY}
      - HTTPS_PROXY=${PROXY}
      - http_proxy=${PROXY}
      - https_proxy=${PROXY}
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "1"]
      start_period: 180s
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  pandora:
    image: ghcr.io/pandora-analysis/pandora:latest
    profiles: [pandora]
    depends_on:
      redis:
        condition: service_started
      kvrocks:
        condition: service_started
      kvrocks-indexing:
        condition: service_started
      clamav:
        condition: service_healthy
    expose: ["6100"]
    mem_limit: 2g
    environment:
      - HTTP_PROXY=${PROXY}
      - HTTPS_PROXY=${PROXY}
      - http_proxy=${PROXY}
      - https_proxy=${PROXY}
    working_dir: /pandora
    tty: true
    command:
      - /bin/sh
      - -c
      - |
          echo "[pandora] waiting for dependencies..."
          sleep 30
          echo "[pandora] reducing gunicorn workers to 2..."
          sed -i "s/'-w', '10'/'-w', '2'/" /pandora/bin/start_website.py
          echo "[pandora] starting workers..."
          poetry run workers_manager &
          echo "[pandora] starting website on port 6100..."
          poetry run start_website &
          echo "[pandora] all services started"
          wait
    env_file:
      - ./docker/pandora/pandora.env
    volumes:
      - pandora_cache:/pandora/cache
      - pandora_storage:/pandora/storage
      - pandora_indexing_sock:/pandora/indexing
      - clamav-socket:/var/run/clamav
      - ./docker/pandora/config/generic.json:/pandora/config/generic.json:ro
      - ./docker/pandora/workers/base.yml:/pandora/pandora/workers/base.yml:ro
      - ./docker/pandora/workers/clamav.yml:/pandora/pandora/workers/clamav.yml:ro
      - ./docker/pandora/yara_rules:/pandora/yara_rules:ro
    restart: unless-stopped

networks:
  dokploy-network:
    external: true

volumes:
  dbdata:
  storage_data:
  pandora_cache:
  pandora_storage:
  pandora_indexing:
  pandora_indexing_sock:
  clamav-socket:
