services:
  db:
    image: mysql:8.0.36-debian
    container_name: nc3_db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 15
      interval: 10s
      start_period: 60s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROXY: ${PROXY}
    container_name: nc3_app
    expose:
      - "80"
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL}
      APP_TIMEZONE: ${APP_TIMEZONE:-UTC}
      APP_LOCALE: ${APP_LOCALE:-en}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_STACK: ${LOG_STACK:-single}
      LOG_LEVEL: ${LOG_LEVEL:-error}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-}
      VITE_APP_NAME: ${VITE_APP_NAME:-}
      API_DOCS_ALLOWED_DOMAINS: ${API_DOCS_ALLOWED_DOMAINS:-}
      PANDORA_ENABLED: ${PANDORA_ENABLED:-false}
      PANDORA_URL: ${PANDORA_URL:-}
      PANDORA_TIMEOUT: ${PANDORA_TIMEOUT:-15}
      PANDORA_BLOCK_MALICIOUS: ${PANDORA_BLOCK_MALICIOUS:-true}
      PROXY: ${PROXY}
    volumes:
      - storage_data:/var/www/html/storage
      - ./public:/var/www/html/public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  dbdata:
  storage_data:
